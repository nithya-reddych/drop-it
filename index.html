<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://kit.fontawesome.com/96c75676d8.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Drop It</title>
</head>
<body>
    <div id="navbar"></div>
    <div class="bottom-bar">
        <div class="bottom-bar-left">
            <a href="index.html" class="bottom-bar-item">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="hotdeals.html" class="bottom-bar-item">
                <i class="fas fa-fire"></i> Hot Deals
            </a>
            <a href="new_products.html" class="bottom-bar-item">
                <i class="fas fa-microphone"></i> New Products
            </a>
        </div>
        <div class="bottom-bar-right">
            <div class="bottom-bar-item">
                <i class="fas fa-phone"></i> 108-10808 24/7 Support Center
            </div>
        </div>
    </div>

    <div class="explore-section">
        <h2>Explore</h2>
        <div class="categories">
            <button class="arrow left-arrow"><i class="fas fa-arrow-left"></i></button>
            <div class="category-list">
                <div class="category-item">
                    <img src="fruits_vegetables.jpg" alt="Fruits & Vegetables">
                    <p>Fruits & Vegetables</p>
                    <span>20 Items</span>
                </div>
                <div class="category-item">
                    <img src="masala_dry_fruits.jpg" alt="Masala & Dry Fruits">
                    <p>Masala & Dry Fruits</p>
                    <span>220 Items</span>
                </div>
                <div class="category-item">
                    <img src="frozen_food.jpg" alt="Frozen Food & Ice Creams">
                    <p>Frozen Food & Ice Creams</p>
                    <span>10 Items</span>
                </div>
                <div class="category-item">
                    <img src="packaged_food.jpg" alt="Packaged Food">
                    <p>Packaged Food</p>
                    <span>40 Items</span>
                </div>
                <div class="category-item">
                    <img src="cool_drinks.jpg" alt="Cool Drinks & Juices">
                    <p>Cool Drinks & Juices</p>
                    <span>23 Items</span>
                </div>
                <div class="category-item">
                    <img src="electrical_accessories.jpg" alt="Electrical & Accessories">
                    <p>Electrical & Accessories</p>
                    <span>3 Items</span>
                </div>
                <div class="category-item">
                    <img src="stationery_crafts.jpg" alt="Stationery & Crafts">
                    <p>Stationery & Crafts</p>
                    <span>9 Items</span>
                </div>
            </div>
            <button class="arrow right-arrow"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

<script src="./navbar.js"></script>
<script src="./slider.js"></script>
</body>
</html>
